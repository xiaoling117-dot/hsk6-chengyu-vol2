<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK6級 成語学習帳 Vol.2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Serif+JP:wght@400;600&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a0f0a;
  --paper: #f5ede0;
  --red: #c0392b;
  --gold: #c9962a;
  --jade: #2d7d6f;
  --purple: #7b5ea7;
  --faded: #8b7355;
  --light-paper: #fdf6ec;
  --border: rgba(201,150,42,0.35);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Noto Serif JP',serif;
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(201,150,42,.07) 0%,transparent 55%),
             radial-gradient(ellipse at 80% 80%,rgba(45,125,111,.05) 0%,transparent 55%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;inset:10px;
  border:1px solid rgba(201,150,42,.25);
  pointer-events:none;z-index:999;
}

/* ======= SCREENS ======= */
.screen{display:none;position:relative;z-index:1;min-height:100vh;}
.screen.active{display:block;}

/* ======= HOME ======= */
#homeScreen{padding:40px 24px 60px;}
.home-header{text-align:center;margin-bottom:44px;}
.deco-line{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:10px;}
.deco-line span{height:1px;width:70px;background:linear-gradient(90deg,transparent,var(--gold));}
.deco-line span:last-child{background:linear-gradient(90deg,var(--gold),transparent);}
.deco-diamond{width:7px;height:7px;background:var(--gold);transform:rotate(45deg);}
.home-title{font-family:'Noto Serif SC',serif;font-size:clamp(20px,4vw,30px);letter-spacing:.15em;}
.home-title em{color:var(--red);font-style:normal;}
.home-vol{
  font-size:12px;letter-spacing:.4em;color:var(--gold);
  margin-top:4px;font-family:'Noto Serif JP',serif;
}
.home-sub{font-size:11px;color:var(--faded);letter-spacing:.2em;margin-top:5px;}

.home-footer{
  text-align:center;margin-top:56px;padding:24px 16px 8px;
  border-top:1px solid var(--border);
}
.footer-copy{font-size:12px;color:var(--faded);letter-spacing:.05em;margin-bottom:6px;}
.footer-notice{font-size:10px;color:rgba(139,115,85,.6);line-height:1.6;}

.home-nav{display:flex;gap:12px;justify-content:center;margin-bottom:40px;flex-wrap:wrap;}
.nav-tab{padding:8px 20px;border:1px solid var(--border);background:none;
  font-family:'Noto Serif JP',serif;font-size:12px;letter-spacing:.15em;
  color:var(--faded);cursor:pointer;border-radius:2px;transition:all .2s;}
.nav-tab:hover,.nav-tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

.theme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;max-width:900px;margin:0 auto;}
.theme-card{
  background:var(--light-paper);border:1px solid var(--border);
  padding:24px 20px;border-radius:2px;cursor:pointer;
  transition:all .25s;position:relative;overflow:hidden;
}
.theme-card::before{
  content:'';position:absolute;inset:0;
  background:var(--ink);transform:translateY(100%);transition:transform .3s ease;z-index:0;
}
.theme-card:hover::before{transform:translateY(0);}
.theme-card:hover .tc-name,.theme-card:hover .tc-count,.theme-card:hover .tc-words{color:var(--paper);}
.theme-card:hover .tc-accent{background:var(--gold);}
.tc-accent{width:24px;height:3px;background:var(--gold);margin-bottom:14px;transition:background .3s;position:relative;z-index:1;}
.tc-name{font-family:'Noto Serif SC',serif;font-size:18px;letter-spacing:.1em;margin-bottom:6px;position:relative;z-index:1;transition:color .3s;}
.tc-count{font-size:11px;color:var(--faded);letter-spacing:.1em;margin-bottom:10px;position:relative;z-index:1;transition:color .3s;}
.tc-words{font-size:12px;color:var(--faded);line-height:1.6;position:relative;z-index:1;transition:color .3s;}

/* index tab on home */
.index-preview{max-width:900px;margin:0 auto;}
.index-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.index-row{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:var(--light-paper);border:1px solid var(--border);border-radius:2px;
  cursor:pointer;transition:all .2s;
}
.index-row:hover{background:var(--ink);color:var(--paper);}
.index-row:hover .ir-pinyin{color:rgba(253,246,236,.6);}
.ir-word{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:600;}
.ir-pinyin{font-size:11px;color:var(--faded);flex:1;}
.ir-theme{font-size:10px;color:var(--gold);letter-spacing:.05em;}

/* ======= FLASHCARD SCREEN ======= */
#cardScreen{padding:28px 20px 60px;max-width:860px;margin:0 auto;}
.screen-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.back-btn{
  background:none;border:1px solid var(--border);color:var(--faded);
  width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;
}
.back-btn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.screen-title{font-family:'Noto Serif SC',serif;font-size:18px;letter-spacing:.1em;}
.screen-title small{font-family:'Noto Serif JP',serif;font-size:11px;color:var(--faded);margin-left:8px;letter-spacing:.1em;}
.mode-btns{margin-left:auto;display:flex;gap:8px;}
.mode-btn{
  padding:6px 14px;border:1px solid var(--border);background:none;
  font-family:'Noto Serif JP',serif;font-size:11px;letter-spacing:.1em;
  color:var(--faded);cursor:pointer;border-radius:2px;transition:all .2s;
}
.mode-btn:hover,.mode-btn.active{background:var(--red);color:white;border-color:var(--red);}

.progress-area{display:flex;align-items:center;gap:14px;margin-bottom:24px;}
.progress-bar-wrap{flex:1;height:3px;background:rgba(139,115,85,.2);border-radius:2px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--red));border-radius:2px;transition:width .5s ease;}
.progress-text{font-size:12px;color:var(--faded);white-space:nowrap;}

/* card */
.card-container{perspective:1400px;margin-bottom:24px;}
.card-wrapper{position:relative;width:100%;height:620px;}
.card{
  position:absolute;width:100%;height:620px;
  transform-style:preserve-3d;
  transition:transform .7s cubic-bezier(.4,0,.2,1);cursor:pointer;
}
.card.flipped{transform:rotateY(180deg);}
.card-face{
  position:absolute;top:0;left:0;width:100%;height:100%;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:2px;overflow-y:auto;overflow-x:hidden;
}
.card-front{
  background:var(--light-paper);border:1px solid var(--border);
  box-shadow:4px 4px 0 rgba(26,15,10,.05),0 16px 48px rgba(26,15,10,.1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 40px;position:relative;
}
.corner{position:absolute;width:18px;height:18px;}
.corner::before,.corner::after{content:'';position:absolute;background:var(--gold);}
.corner::before{width:100%;height:1px;top:0;left:0;}
.corner::after{width:1px;height:100%;top:0;left:0;}
.corner.tl{top:14px;left:14px;}
.corner.tr{top:14px;right:14px;transform:scaleX(-1);}
.corner.bl{bottom:14px;left:14px;transform:scaleY(-1);}
.corner.br{bottom:14px;right:14px;transform:scale(-1);}
.card-badge{position:absolute;top:16px;right:16px;font-size:11px;color:var(--faded);}
.front-label{font-size:10px;letter-spacing:.3em;color:var(--faded);margin-bottom:24px;}
.chengyu-main{
  font-family:'Ma Shan Zheng','Noto Serif SC',serif;
  font-size:clamp(50px,10vw,78px);color:var(--ink);
  letter-spacing:.1em;line-height:1;margin-bottom:18px;
  text-shadow:2px 2px 0 rgba(201,150,42,.12);
}
.pinyin-main{font-size:17px;color:var(--red);letter-spacing:.18em;margin-bottom:6px;}
.flip-hint{font-size:10px;color:var(--faded);letter-spacing:.15em;margin-top:20px;
  display:flex;align-items:center;gap:8px;}
.flip-hint::before,.flip-hint::after{content:'◇';color:var(--gold);font-size:7px;}

.card-back{
  background:var(--light-paper);border:1px solid var(--border);
  box-shadow:4px 4px 0 rgba(26,15,10,.05),0 16px 48px rgba(26,15,10,.1);
  transform:rotateY(180deg);padding:28px 32px 28px;
}
.back-header{
  display:flex;align-items:center;gap:12px;
  margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border);
}
.back-chengyu{font-family:'Ma Shan Zheng','Noto Serif SC',serif;font-size:28px;}
.back-pinyin{font-size:14px;color:var(--red);letter-spacing:.08em;flex:1;}
.speak-btn{
  background:none;border:1px solid var(--gold);color:var(--gold);
  width:32px;height:32px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:13px;
  transition:all .2s;flex-shrink:0;
}
.speak-btn:hover{background:var(--gold);color:white;}
.speak-btn.speaking{animation:pulse .8s ease infinite;background:var(--gold);color:white;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}

.meaning-section{
  background:rgba(201,150,42,.06);border-left:3px solid var(--gold);
  padding:11px 15px;margin-bottom:16px;border-radius:0 2px 2px 0;
}
.meaning-text{font-size:14px;line-height:1.75;color:var(--ink);}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:580px){.info-grid{grid-template-columns:1fr;}}
.info-card{border:1px solid rgba(139,115,85,.22);border-radius:2px;padding:12px 14px;background:rgba(255,255,255,.35);}
.info-card-label{
  font-size:9px;letter-spacing:.25em;color:var(--faded);margin-bottom:8px;
  display:flex;align-items:center;gap:5px;
}
.info-card-label::before{content:'';width:14px;height:1px;background:var(--faded);}
.syn{border-top:2px solid var(--jade);}
.syn .info-card-label{color:var(--jade);}
.syn .info-card-label::before{background:var(--jade);}
.ant{border-top:2px solid var(--red);}
.ant .info-card-label{color:var(--red);}
.ant .info-card-label::before{background:var(--red);}
.conf{border-top:2px solid var(--purple);grid-column:1/-1;}
.conf .info-card-label{color:var(--purple);}
.conf .info-card-label::before{background:var(--purple);}
.ex-card{border-top:2px solid var(--jade);grid-column:1/-1;border:1px solid rgba(45,125,111,.25);border-radius:2px;padding:12px 14px;background:rgba(45,125,111,.04);}
.ex-label{font-size:9px;letter-spacing:.25em;color:var(--jade);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.ex-label::before{content:'';width:14px;height:1px;background:var(--jade);}

.info-item{margin-bottom:8px;}
.info-item:last-child{margin-bottom:0;}
.info-item-header{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.info-chinese{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:600;}
.info-pinyin{font-size:11px;color:var(--red);flex:1;}
.info-meaning{font-size:11px;color:var(--faded);margin-top:2px;line-height:1.5;}
.mini-speak-btn{
  background:none;border:1px solid rgba(139,115,85,.3);color:var(--faded);
  width:30px;height:30px;border-radius:50%;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:13px;transition:all .18s;padding:0;flex-shrink:0;
}
.mini-speak-btn:hover{border-color:var(--gold);color:var(--gold);}
.mini-speak-btn.speaking{animation:pulse .8s ease infinite;background:var(--gold);color:white;border-color:var(--gold);}

.ex-zh{font-family:'Noto Serif SC',serif;font-size:14px;line-height:1.8;color:var(--ink);margin-bottom:3px;}
.ex-zh .hl{color:var(--red);font-weight:600;}
.ex-py{font-size:10px;color:var(--faded);line-height:1.5;margin-bottom:3px;}
.ex-ja{font-size:11px;color:var(--faded);border-top:1px dashed rgba(139,115,85,.2);padding-top:5px;line-height:1.6;}

/* nav */
.nav-area{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:4px;}
.nav-btn{
  background:none;border:1px solid rgba(139,115,85,.35);color:var(--ink);
  width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.nav-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
.nav-btn:disabled{opacity:.3;cursor:not-allowed;}
.flip-btn{
  background:var(--ink);color:var(--paper);border:none;
  padding:12px 32px;border-radius:2px;
  font-family:'Noto Serif JP',serif;font-size:12px;letter-spacing:.2em;
  cursor:pointer;transition:background .25s;
}
.flip-btn:hover{background:var(--red);}
.dots{display:flex;gap:5px;justify-content:center;margin-top:16px;flex-wrap:wrap;}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(139,115,85,.3);cursor:pointer;transition:all .3s;}
.dot.active{background:var(--gold);transform:scale(1.4);}
.tts-status{text-align:center;font-size:10px;color:var(--faded);margin-top:8px;min-height:14px;letter-spacing:.08em;}

/* slide animations */
.card.slide-out-l{animation:solL .28s ease forwards;}
.card.slide-in-r{animation:sirR .3s ease forwards;}
.card.slide-out-r{animation:sorR .28s ease forwards;}
.card.slide-in-l{animation:silL .3s ease forwards;}
@keyframes solL{to{transform:translateX(-70px);opacity:0;}}
@keyframes sirR{from{transform:translateX(70px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes sorR{to{transform:translateX(70px);opacity:0;}}
@keyframes silL{from{transform:translateX(-70px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* ======= TEST SCREEN ======= */
#testScreen{padding:28px 20px 60px;max-width:780px;margin:0 auto;}
.test-type-bar{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.test-type-btn{
  padding:7px 16px;border:1px solid var(--border);background:none;
  font-family:'Noto Serif JP',serif;font-size:11px;letter-spacing:.1em;
  color:var(--faded);cursor:pointer;border-radius:2px;transition:all .2s;
}
.test-type-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.test-score-bar{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.score-label{font-size:12px;color:var(--faded);}
.score-val{font-size:18px;font-weight:600;color:var(--ink);}
.score-val span{font-size:12px;color:var(--faded);}

.test-card{
  background:var(--light-paper);border:1px solid var(--border);
  padding:32px 32px 28px;border-radius:2px;
  box-shadow:0 12px 40px rgba(26,15,10,.08);margin-bottom:20px;
}
.test-question-label{font-size:10px;letter-spacing:.25em;color:var(--faded);margin-bottom:16px;}
.test-word{
  font-family:'Ma Shan Zheng','Noto Serif SC',serif;
  font-size:clamp(42px,8vw,64px);color:var(--ink);
  text-align:center;margin-bottom:8px;letter-spacing:.08em;
}
.test-pinyin{font-size:16px;color:var(--red);text-align:center;letter-spacing:.15em;margin-bottom:24px;}
.test-prompt{font-size:13px;color:var(--faded);text-align:center;margin-bottom:20px;letter-spacing:.05em;}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:500px){.choices{grid-template-columns:1fr;}}
.choice-btn{
  background:rgba(255,255,255,.5);border:1px solid rgba(139,115,85,.25);
  padding:13px 16px;border-radius:2px;text-align:left;
  font-family:'Noto Serif JP',serif;font-size:13px;
  cursor:pointer;transition:all .2s;line-height:1.5;
}
.choice-btn:hover:not(:disabled){border-color:var(--gold);background:rgba(201,150,42,.06);}
.choice-btn.correct{background:rgba(45,125,111,.12);border-color:var(--jade);color:var(--jade);}
.choice-btn.wrong{background:rgba(192,57,43,.08);border-color:var(--red);color:var(--red);}
.choice-btn:disabled{cursor:default;}
.choice-chinese{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:600;display:block;}

/* pinyin input */
.pinyin-input-wrap{display:flex;flex-direction:column;gap:10px;align-items:stretch;}
.pinyin-input{
  width:100%;border:1px solid var(--border);background:rgba(255,255,255,.6);
  padding:13px 14px;font-size:15px;font-family:'Noto Serif JP',serif;
  border-radius:2px;outline:none;transition:border .2s;
}
.pinyin-input:focus{border-color:var(--gold);}
.pinyin-input.correct{border-color:var(--jade);background:rgba(45,125,111,.08);}
.pinyin-input.wrong{border-color:var(--red);background:rgba(192,57,43,.06);}
.submit-btn{
  width:100%;padding:13px 20px;background:var(--ink);color:var(--paper);border:none;
  font-family:'Noto Serif JP',serif;font-size:13px;letter-spacing:.15em;
  cursor:pointer;border-radius:2px;transition:background .2s;
}
.submit-btn:hover{background:var(--red);}
.pinyin-hint{font-size:10px;color:var(--faded);margin-bottom:4px;line-height:1.5;}
.pinyin-feedback{font-size:12px;margin-top:8px;min-height:16px;}
.pinyin-feedback.correct{color:var(--jade);}
.pinyin-feedback.wrong{color:var(--red);}

.test-result-box{
  background:rgba(45,125,111,.06);border:1px solid rgba(45,125,111,.2);
  padding:12px 16px;border-radius:2px;margin-top:12px;
  font-size:12px;line-height:1.7;color:var(--faded);display:none;
}
.test-result-box.show{display:block;}
.result-word{font-family:'Noto Serif SC',serif;font-size:15px;color:var(--ink);margin-bottom:4px;}

.next-test-btn{
  display:block;width:100%;padding:13px;background:var(--ink);color:var(--paper);border:none;
  font-family:'Noto Serif JP',serif;font-size:13px;letter-spacing:.2em;
  cursor:pointer;border-radius:2px;transition:background .2s;margin-top:12px;
}
.next-test-btn:hover{background:var(--red);}
.test-complete{text-align:center;padding:40px 20px;}
.tc-score{font-size:48px;font-weight:700;color:var(--red);margin-bottom:8px;}
.tc-msg{font-size:14px;color:var(--faded);margin-bottom:24px;}
.restart-btn{
  padding:12px 32px;background:var(--ink);color:var(--paper);border:none;
  font-family:'Noto Serif JP',serif;font-size:13px;letter-spacing:.2em;
  cursor:pointer;border-radius:2px;transition:background .2s;
}
.restart-btn:hover{background:var(--red);}

/* ===== Vol.2 新機能 ===== */
/* Vol.1リンクボタン */
.vol-link-bar{display:flex;justify-content:center;margin-bottom:20px;}
.vol-link-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:9px 22px;border:1px solid var(--border);
  background:var(--light-paper);color:var(--faded);
  font-family:'Noto Serif JP',serif;font-size:12px;letter-spacing:.1em;
  border-radius:2px;cursor:pointer;text-decoration:none;transition:all .25s;
}
.vol-link-btn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink);}

/* 進捗サマリー */
.progress-summary{
  max-width:900px;margin:0 auto 24px;
  background:var(--light-paper);border:1px solid var(--border);
  padding:13px 20px;border-radius:2px;
}
.ps-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.ps-label{font-size:11px;color:var(--faded);letter-spacing:.1em;white-space:nowrap;}
.ps-bar{flex:1;min-width:80px;height:4px;background:rgba(139,115,85,.2);border-radius:2px;overflow:hidden;}
.ps-fill{height:100%;background:linear-gradient(90deg,var(--jade),var(--gold));border-radius:2px;transition:width .6s ease;}
.ps-count{font-size:12px;color:var(--jade);font-weight:600;white-space:nowrap;}
.ps-weak-link{font-size:11px;color:var(--red);cursor:pointer;text-decoration:underline;text-underline-offset:2px;white-space:nowrap;}
.ps-weak-link:hover{opacity:.7;}

/* 苦手リスト */
.weak-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;max-width:900px;margin:0 auto;}
.weak-empty{text-align:center;padding:50px 20px;color:var(--faded);font-size:13px;line-height:2;}
.weak-row{

}
.weak-row:hover{background:rgba(192,57,43,.05);}
.wr-word{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:600;}
.wr-pinyin{font-size:11px;color:var(--faded);flex:1;}
.wr-del{background:none;border:none;color:rgba(139,115,85,.4);cursor:pointer;font-size:14px;transition:color .2s;padding:2px 4px;}
.wr-del:hover{color:var(--red);}

/* 索引に✅⚠マーク */
.index-row{position:relative;}
.ir-badges{display:flex;gap:3px;flex-shrink:0;}

/* カード表面の学習済み・苦手ボタン */
.card-action-area{
  position:absolute;top:14px;left:14px;
  display:flex;gap:6px;z-index:10;
}
.card-action-btn{
  background:rgba(253,246,236,.85);border:1px solid rgba(139,115,85,.3);
  width:30px;height:30px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:all .2s;padding:0;
  backdrop-filter:blur(2px);
}
.card-action-btn:hover{transform:scale(1.15);}
.card-action-btn.active-learned{background:rgba(45,125,111,.15);border-color:var(--jade);}
.card-action-btn.active-weak{background:rgba(192,57,43,.15);border-color:var(--red);}
.card-status-row{font-size:10px;margin-top:10px;min-height:15px;letter-spacing:.08em;display:flex;gap:10px;justify-content:center;}
.status-learned{color:var(--jade);}
.status-weak{color:var(--red);}

/* テスト結果の苦手ボタン */
.add-weak-btn{
  display:inline-flex;align-items:center;gap:5px;margin-top:8px;
  padding:5px 14px;border:1px solid rgba(192,57,43,.4);background:none;
  color:var(--red);font-family:'Noto Serif JP',serif;font-size:11px;
  border-radius:2px;cursor:pointer;transition:all .2s;
}
.add-weak-btn:hover{background:rgba(192,57,43,.08);}
.add-weak-btn.registered{background:rgba(192,57,43,.12);border-color:var(--red);}

/* ドットに学習済みマーク */
.dot.is-learned{background:var(--jade);opacity:.7;}
.dot.is-weak{background:var(--red);opacity:.7;}
.dot.active{opacity:1;transform:scale(1.4);}

      {word:"出奇制胜",pinyin:"chū qí zhì shèng",meaning:"奇策を出して勝利を制する。意表を突く方法で相手を打ち破ること。",
       origin:"出典：『孫子・勢篇』。「凡戦者、以正合、以奇勝」（戦いは正攻法で対峙し、奇策で勝つ）という兵法思想に基づく。「正」と「奇」を組み合わせた戦術は孫子兵法の核心の一つ。",
       example:{zh:"在激烈竞争中，他出奇制胜，推出了让所有人都没想到的新产品。",pinyin:"Zài jīliè jìngzhēng zhōng, tā chū qí zhì shèng, tuīchūle ràng suǒyǒu rén dōu méi xiǎngdào de xīn chǎnpǐn.",ja:"激しい競争の中で奇策を出して勝利を制し、誰も予想しなかった新製品を投入した。"},
       synonyms:[{word:"出人意料",pinyin:"chū rén yì liào",meaning:"人の意表を突く"}],
       antonyms:[{word:"循规蹈矩",pinyin:"xún guī dǎo jǔ",meaning:"規則・慣例を踏み守る"}],
       confuse:[{word:"剑走偏锋",pinyin:"jiàn zǒu piān fēng",meaning:"型破りな方法をとること。「出奇制胜」は奇策で勝利すること、「剑走偏锋」は非正統的な方法をとること全般。"}]}
    ]

  {
    id:"mindset2", name:"🧠 心理・感情", color:"#7b5ea7",
    words:[
      {word:"如坐针毡",pinyin:"rú zuò zhēn zhān",meaning:"針のむしろに座るよう。非常に落ち着かず、不安や居心地の悪さを感じること。",
       origin:"出典：『晋書・杜錫伝』。西晋の杜錫が太子・司馬遹に何度も諫言したところ、太子が布団に針を刺して杜錫を坐らせた。杜錫はその苦痛に気づかないほど正直だったという故事から転じて、落ち着かない状態を表すようになった。",
       example:{zh:"被老板盯着开会，他如坐针毡，根本无法集中。",pinyin:"Bèi lǎobǎn dīngzhe kāihuì, tā rú zuò zhēn zhān, gēnběn wúfǎ jízhōng.",ja:"上司に見張られながら会議に臨み、針のむしろに座るようで全く集中できなかった。"},
       synonyms:[{word:"坐立不安",pinyin:"zuò lì bù ān",meaning:"座っても立っても落ち着かない"}],
       antonyms:[{word:"泰然自若",pinyin:"tài rán zì ruò",meaning:"泰然自若として動じない"}],
       confuse:[{word:"坐立不安",pinyin:"zuò lì bù ān",meaning:"「如坐针毡」は外部圧力による居心地の悪さ、「坐立不安」はより一般的な落ち着きのなさ。"}]},
      {word:"心急如焚",pinyin:"xīn jí rú fén",meaning:"心が燃えるように焦る。非常に焦って気持ちが落ち着かない状態。",
       origin:"唐代の詩文に「心焚」などの表現が見られ、そこから発展した成語。心配・焦りの激しさを「燃える炎」に喩えるのは中国語の感情表現に多く見られるパターン。現代でも日常的に広く使われる。",
       example:{zh:"孩子还没回家，已经深夜了，妈妈心急如焚，不停地打电话。",pinyin:"Háizi hái méi huí jiā, yǐjīng shēnyè le, māma xīn jí rú fén, bùtíng de dǎ diànhuà.",ja:"深夜になっても子供が帰らず、母親は心が燃えるように焦り電話をかけ続けた。"},
       synonyms:[{word:"火烧眉毛",pinyin:"huǒ shāo méimao",meaning:"眉毛が燃える（危機が差し迫っている）"}],
       antonyms:[{word:"心平气和",pinyin:"xīn píng qì hé",meaning:"心穏やかで気持ちが落ち着いている"}],
       confuse:[{word:"迫不及待",pinyin:"pò bù jí dài",meaning:"待ちきれないほど急いでいる。「心急如焚」は不安・心配からの焦り、「迫不及待」は期待・欲求からの焦り。"}]},
      {word:"半信半疑",pinyin:"bàn xìn bàn yí",meaning:"半分信じて半分疑う。完全には信じきれない状態。",
       origin:"唐・元稹の詩文など中唐以降の文学作品に類似の表現が見られ、宋代以降に成語として定着した。「信」と「疑」の対比構造を「半半」で表す表現パターンは中国語に多く見られる。",
       example:{zh:"听到这个消息，他半信半疑，不知道是真是假。",pinyin:"Tīng dào zhège xiāoxi, tā bàn xìn bàn yí, bù zhīdào shì zhēn shì jiǎ.",ja:"この知らせを聞いて、彼は半信半疑で、本当か嘘かわからなかった。"},
       synonyms:[{word:"将信将疑",pinyin:"jiāng xìn jiāng yí",meaning:"信じようとしながらも疑う"}],
       antonyms:[{word:"深信不疑",pinyin:"shēn xìn bù yí",meaning:"深く信じて疑わない"}],
       confuse:[{word:"疑信参半",pinyin:"yí xìn cān bàn",meaning:"「半信半疑」は「信」が先で少し信じる気持ちが強く、「疑信参半」は「疑」が先で疑いがやや強いニュアンス。"}]},
      {word:"患得患失",pinyin:"huàn dé huàn shī",meaning:"得ることも失うことも気に病む。損得を過度に気にして行動できない小心さ。",
       origin:"出典：『論語・陽貨篇』。「其未得之也、患得之；既得之、患失之。苟患失之、无所不至矣」（得る前には得られないかと心配し、得ると失うのを心配する。失うことを心配し始めると何でもしかねない）という孔子の言葉に由来。",
       example:{zh:"他做任何事都患得患失，总担心这样那样，结果什么都没做成。",pinyin:"Tā zuò rènhé shì dōu huàn dé huàn shī, zǒng dānxīn zhèyàng nàyàng, jiéguǒ shénme dōu méi zuò chéng.",ja:"何事にも損得を気にしすぎて、これやあれやと心配するばかりで結局何も成し遂げられなかった。"},
       synonyms:[{word:"瞻前顾后",pinyin:"zhān qián gù hòu",meaning:"前後を見渡して躊躇する"}],
       antonyms:[{word:"义无反顾",pinyin:"yì wú fǎn gù",meaning:"正義のために振り返らず突き進む"}],
       confuse:[{word:"举棋不定",pinyin:"jǔ qí bù dìng",meaning:"碁石を持ったまま決められない。「患得患失」は損得への過剰な執着、「举棋不定」は優柔不断で決断できないこと。"}]},
      {word:"忐忑不安",pinyin:"tǎn tè bù ān",meaning:"心がどきどきして落ち着かない。不安や心配で気持ちが安定しない状態。",
       origin:"「忐忑」はもともと心臓がどきどきする擬音に由来する言葉で、『水滸伝』など明代の白話小説に用例が見られる。上下に動く心臓の動きが不安定な心理状態を表す象形的な文字構成をもつ。",
       example:{zh:"面试结果出来之前，他一直忐忑不安，睡不着觉。",pinyin:"Miànshì jiéguǒ chūlái zhīqián, tā yīzhí tǎn tè bù ān, shuì bù zháo jiào.",ja:"面接の結果が出るまで、彼はずっとどきどきして落ち着かず眠れなかった。"},
       synonyms:[{word:"心神不宁",pinyin:"xīn shén bù níng",meaning:"心が落ち着かない"}],
       antonyms:[{word:"胸有成竹",pinyin:"xiōng yǒu chéng zhú",meaning:"十分な準備と自信を持って臨む"}],
       confuse:[{word:"惶恐不安",pinyin:"huáng kǒng bù ān",meaning:"恐れおののいて不安。「忐忑不安」は期待と不安が入り混じる状態、「惶恐不安」は恐怖・畏怖からくる不安。"}]},
      {word:"喜出望外",pinyin:"xǐ chū wàng wài",meaning:"望み以上の喜びが外から来る。期待以上の良い結果に非常に喜ぶこと。",
       origin:"宋・苏轼『与李之仪書』に「喜出望外」の用例が見られる。「望」は期待・予想を意味し、それを「外」（超えた）という構造が非常に明快で覚えやすい成語。現代語でも自然に使える。",
       example:{zh:"没想到他竟然录取了，这个消息让全家人喜出望外。",pinyin:"Méi xiǎngdào tā jìngrán lùqǔle, zhège xiāoxi ràng quán jiārén xǐ chū wàng wài.",ja:"まさか合格するとは思っておらず、その知らせは家族全員に望み以上の喜びをもたらした。"},
       synonyms:[{word:"大喜过望",pinyin:"dà xǐ guò wàng",meaning:"期待以上の大きな喜び"}],
       antonyms:[{word:"大失所望",pinyin:"dà shī suǒ wàng",meaning:"大きく期待を裏切られる"}],
       confuse:[{word:"喜从天降",pinyin:"xǐ cóng tiān jiàng",meaning:"突然の幸運。「喜出望外」は期待を超えた喜び、「喜从天降」は予期せぬ突然の幸運。"}]},
      {word:"悲喜交加",pinyin:"bēi xǐ jiāo jiā",meaning:"悲しみと喜びが入り交じる。相反する感情が同時に押し寄せること。",
       origin:"宋代の文学作品に類似の表現が見られ、元代以降に成語として広まった。「交加」は二つのものが交互に・同時に来ることを意味し、相反する感情が一度に訪れる複雑な心理状態を表す。",
       example:{zh:"得知父亲病愈，但又听说公司破产，他一时悲喜交加，不知如何是好。",pinyin:"Dézhī fùqīn bìng yù, dàn yòu tīngshuō gōngsī pòchǎn, tā yīshí bēi xǐ jiāo jiā, bù zhī rúhé shì hǎo.",ja:"父の病気回復を知ったが、会社の倒産も聞き、悲しみと喜びが入り交じって何とも言えない気持ちになった。"},
       synonyms:[{word:"百感交集",pinyin:"bǎi gǎn jiāo jí",meaning:"百の感情が入り交じる"}],
       antonyms:[{word:"喜上眉梢",pinyin:"xǐ shàng méi shāo",meaning:"眉の先に喜びが上る（純粋な喜び）"}],
       confuse:[{word:"百感交集",pinyin:"bǎi gǎn jiāo jí",meaning:"「悲喜交加」は悲しみと喜びの二つの感情、「百感交集」はより多くの感情が複雑に入り交じる状態。"}]},
      {word:"垂头丧气",pinyin:"chuí tóu sàng qì",meaning:"頭を垂れて気力を失う。失敗や失望でがっくりと落ち込んでいる様子。",
       origin:"「垂头」（頭を垂れる）と「丧气」（気力を失う）が組み合わさった成語。頭を下げるという身体的表現と意気消沈という心理的表現が合わさり、視覚的に落ち込んだ状態を描写する。宋代の文学作品に用例がある。",
       example:{zh:"比赛输了之后，他垂头丧气地回到更衣室，一句话都不说。",pinyin:"Bǐsài shū le zhīhòu, tā chuí tóu sàng qì de huídào gēngyīshì, yī jù huà dōu bù shuō.",ja:"試合に負けた後、彼は頭を垂れてがっくり落ち込みながらロッカールームに戻り一言も話さなかった。"},
       synonyms:[{word:"灰心丧气",pinyin:"huī xīn sàng qì",meaning:"意気消沈する"}],
       antonyms:[{word:"昂首阔步",pinyin:"áng shǒu kuò bù",meaning:"頭を高く上げて大またで歩く（自信満々）"}],
       confuse:[{word:"灰心丧气",pinyin:"huī xīn sàng qì",meaning:"「垂头丧气」は外見・態度に表れる落ち込み、「灰心丧气」は内心の意欲・希望の喪失。"}]},
      {word:"怒发冲冠",pinyin:"nù fà chōng guān",meaning:"怒りで髪の毛が冠を衝く。激しく怒ること。",
       origin:"出典：『史記・廉頗藺相如列伝』。藺相如が秦王に璧を要求された際「臣の頭と璧を同時に柱に叩きつける」と言った場面で「怒発上冲冠」という表現が使われた。また岳飛の詞「满江红」にも「怒发冲冠」という表現がある。",
       example:{zh:"听说员工被无故解雇，工会代表怒发冲冠，立刻召开紧急会议。",pinyin:"Tīngshuō yuángōng bèi wúgù jiěgù, gōnghuì dàibiǎo nù fà chōng guān, lìkè zhāokāi jǐnjí huìyì.",ja:"従業員が不当解雇されたと聞き、組合代表は激怒してすぐに緊急会議を招集した。"},
       synonyms:[{word:"勃然大怒",pinyin:"bó rán dà nù",meaning:"突然激しく怒る"}],
       antonyms:[{word:"心平气和",pinyin:"xīn píng qì hé",meaning:"心穏やかで気持ちが落ち着いている"}],
       confuse:[{word:"义愤填膺",pinyin:"yì fèn tián yīng",meaning:"正義の怒りで胸が満ちる。「怒发冲冠」は激しい怒りの描写、「义愤填膺」は不正に対する正当な怒りを強調。"}]},
      {word:"情不自禁",pinyin:"qíng bù zì jìn",meaning:"感情が自分を禁じることができない。感情を抑えきれない状態。",
       origin:"「情不自禁」は南朝・梁の劉遵の詩に「情不自禁」の用例が見られる。感情（情）が自己制御（自禁）を超えるという構造で、喜怒哀楽いずれの場面にも使える万能な感情表現として定着した。",
       example:{zh:"看到久别重逢的老友，他情不自禁地流下了眼泪。",pinyin:"Kàndào jiǔ bié chóngféng de lǎo yǒu, tā qíng bù zì jìn de liú xià le yǎnlèi.",ja:"長年ぶりに再会した旧友を見て、彼は感情を抑えきれず涙を流した。"},
       synonyms:[{word:"不由自主",pinyin:"bù yóu zì zhǔ",meaning:"自分の意思で止められない"}],
       antonyms:[{word:"泰然自若",pinyin:"tài rán zì ruò",meaning:"泰然自若として感情に動じない"}],
       confuse:[{word:"不由自主",pinyin:"bù yóu zì zhǔ",meaning:"「情不自禁」は感情の抑制ができない、「不由自主」は行動・感情を問わず自分の意思でコントロールできないこと。"}]}
    ]
  },
  {
    id:"study2", name:"📖 学問・才能", color:"#2d7d6f",
    words:[
      {word:"博览群书",pinyin:"bó lǎn qún shū",meaning:"多くの書物を幅広く読む。広く様々な本を読んで知識を積むこと。",
       origin:"「博覧」は漢代から使われた表現で、広く書物を読むことを指す。「群書」は多くの書物の意。古代中国では書物を読むことが学問・出世の基本であり、「博覧群書」は理想的な学者像を表す言葉として定着した。",
       example:{zh:"他从小博览群书，知识渊博，什么问题都难不倒他。",pinyin:"Tā cóngxiǎo bó lǎn qún shū, zhīshi yuānbó, shénme wèntí dōu nán bù dǎo tā.",ja:"幼い頃から幅広く書物を読んで博識で、どんな問題も彼には難しくなかった。"},
       synonyms:[{word:"博学多才",pinyin:"bó xué duō cái",meaning:"学識が広く才能が多い"}],
       antonyms:[{word:"孤陋寡闻",pinyin:"gū lòu guǎ wén",meaning:"見聞が狭く無知"}],
       confuse:[{word:"学富五车",pinyin:"xué fù wǔ chē",meaning:"五台の車に積むほどの学識。「博览群书」は読書行為の広さ、「学富五车」は蓄積された学識の豊かさ。"}]},
      {word:"学富五车",pinyin:"xué fù wǔ chē",meaning:"五台の車に積むほどの学識がある。非常に博識であること。",
       origin:"出典：『荘子・天下篇』。恵施（宵子）は多くの書物を持ち、五台の車を満たすほどだったという記述に由来。古代では書物は竹簡に書かれ非常に重かった。「五車」は現代で言えば図書館一棟分に相当する膨大な量。",
       example:{zh:"这位教授学富五车，讲起课来旁征博引，令学生钦佩不已。",pinyin:"Zhè wèi jiàoshòu xué fù wǔ chē, jiǎng qǐ kè lái páng zhēng bó yǐn, lìng xuésheng qīnpèi bùyǐ.",ja:"この教授は非常な博識で、授業では引用が豊かで学生たちを大いに感服させた。"},
       synonyms:[{word:"才高八斗",pinyin:"cái gāo bā dǒu",meaning:"才能が非常に高い"}],
       antonyms:[{word:"才疏学浅",pinyin:"cái shū xué qiǎn",meaning:"才能が乏しく学問が浅い"}],
       confuse:[{word:"才高八斗",pinyin:"cái gāo bā dǒu",meaning:"「学富五车」は蓄積した学識の量、「才高八斗」は生まれ持った才能・文才の高さ。"}]},
      {word:"融会贯通",pinyin:"róng huì guàn tōng",meaning:"融け合って貫き通る。様々な知識を融合させて根本原理を理解すること。",
       origin:"宋代の朱熹が学問の理想として強調した概念。「融会」は異なる知識が融け合うこと、「贯通」はそれが根本まで貫くこと。「読書百遍而義自見」（百回読めば意味は自ずとわかる）の境地に相当する深い理解を指す。",
       example:{zh:"学语言不能死记硬背，要融会贯通，理解语言背后的文化和逻辑。",pinyin:"Xué yǔyán bùnéng sǐ jì yìng bèi, yào róng huì guàn tōng, lǐjiě yǔyán bèihòu de wénhuà hé luójí.",ja:"語学学習は丸暗記ではなく、言語の背後にある文化と論理を理解して融会貫通することが大切だ。"},
       synonyms:[{word:"触类旁通",pinyin:"chù lèi páng tōng",meaning:"一つを知って類似のことも理解する"}],
       antonyms:[{word:"死记硬背",pinyin:"sǐ jì yìng bèi",meaning:"機械的に丸暗記する"}],
       confuse:[{word:"触类旁通",pinyin:"chù lèi páng tōng",meaning:"「融会贯通」は多様な知識を統合して深く理解すること、「触类旁通」は一つの事例から関連する事柄を推測・理解すること。"}]},
      {word:"举一反三",pinyin:"jǔ yī fǎn sān",meaning:"一を挙げれば三に反る。一つのことから多くのことを類推・応用できること。",
       origin:"出典：『論語・述而篇』。「挙一隅不以三隅反、則不復也」（一つの角を示しても残りの三つの角を推測できない者には、繰り返し教えない）という孔子の言葉に由来。応用力・推論力こそが真の学力であるという儒家の教育観を示す。",
       example:{zh:"好的学生不只是记住老师教的，还能举一反三，自己推导出新的结论。",pinyin:"Hǎo de xuésheng bùzhǐ shì jìzhù lǎoshī jiāo de, hái néng jǔ yī fǎn sān, zìjǐ tuīdǎo chū xīn de jiélùn.",ja:"優秀な生徒は教わったことを覚えるだけでなく、一を聞いて十を知るように自分で新しい結論を導き出せる。"},
       synonyms:[{word:"触类旁通",pinyin:"chù lèi páng tōng",meaning:"一つを知って類似のことも理解する"}],
       antonyms:[{word:"死记硬背",pinyin:"sǐ jì yìng bèi",meaning:"機械的に丸暗記する"}],
       confuse:[{word:"闻一知十",pinyin:"wén yī zhī shí",meaning:"一を聞いて十を知る。「举一反三」は応用・推論の能力、「闻一知十」は理解力・洞察力の高さ。"}]},
      {word:"孜孜不倦",pinyin:"zī zī bù juàn",meaning:"倦むことなく励み続ける。勉強や仕事に休まず熱心に取り組むこと。",
       origin:"出典：『書経・益稷篇』。「汝往哉！無荒棄朕命！孜孜罔怠」（行け！私の命を無駄にするな！倦まず励め）という舜の言葉に由来。「孜孜」は勤勉に励む様子を表す重ね言葉で、儒家の勤勉の徳を象徴する表現。",
       example:{zh:"他孜孜不倦地研究了二十年，终于在这个领域取得了突破性成果。",pinyin:"Tā zī zī bù juàn de yánjiūle èrshí nián, zhōngyú zài zhège lǐngyù qǔdéle tūpòxìng chéngguǒ.",ja:"二十年間倦まず弛まず研究を続け、ついにこの分野で画期的な成果を上げた。"},
       synonyms:[{word:"锲而不舍",pinyin:"qiè ér bù shě",meaning:"彫り続けて諦めない"}],
       antonyms:[{word:"三天打鱼两天晒网",pinyin:"sān tiān dǎ yú liǎng tiān shài wǎng",meaning:"三日漁をして二日網を干す（続かない）"}],
       confuse:[{word:"持之以恒",pinyin:"chí zhī yǐ héng",meaning:"恒心を持って続ける。「孜孜不倦」は熱心に励む姿勢の描写、「持之以恒」は継続すること自体への意志を強調。"}]},
      {word:"见多识广",pinyin:"jiàn duō shí guǎng",meaning:"多くを見て広く知る。経験豊富で物事を広く知っていること。",
       origin:"明代の冯梦龙『古今小説』などの白話文学に用例が見られる成語。「百聞は一見に如かず」と同様の思想に基づき、実体験・見聞の広さが知恵の源泉であるという考え方を表す。",
       example:{zh:"这位老师傅见多识广，无论遇到什么问题都能迅速找到解决方法。",pinyin:"Zhè wèi lǎo shīfu jiàn duō shí guǎng, wúlùn yùdào shénme wèntí dōu néng xùnsù zhǎodào jiějué fāngfǎ.",ja:"この老師匠は見識が広く、どんな問題に遭遇しても素早く解決策を見つけることができた。"},
       synonyms:[{word:"博学多才",pinyin:"bó xué duō cái",meaning:"学識が広く才能が多い"}],
       antonyms:[{word:"孤陋寡闻",pinyin:"gū lòu guǎ wén",meaning:"見聞が狭く無知"}],
       confuse:[{word:"博闻强记",pinyin:"bó wén qiáng jì",meaning:"広く見聞して強く記憶する。「见多识广」は実体験を通じた幅広い知識、「博闻强记」は情報収集と記憶力の高さ。"}]},
      {word:"才思敏捷",pinyin:"cái sī mǐn jié",meaning:"才能と思考が素早く敏捷。頭の回転が速く機転が利くこと。",
       origin:"「才思」は才能と思考力の組み合わせ、「敏捷」は素早さを表す。科挙制度が盛んだった唐宋時代に詩文を即興で作る能力が重視され、そのような才能を形容する言葉として発展した。",
       example:{zh:"她才思敏捷，在辩论中总能快速找到对方论点的漏洞。",pinyin:"Tā cái sī mǐnjié, zài biànlùn zhōng zǒng néng kuàisù zhǎodào duìfāng lùndiǎn de lòudòng.",ja:"彼女は才知に富んで頭の回転が速く、ディベートでは常に相手の論点の穴を素早く見つけ出せた。"},
       synonyms:[{word:"聪明伶俐",pinyin:"cōng míng líng lì",meaning:"賢くて機転が利く"}],
       antonyms:[{word:"反应迟钝",pinyin:"fǎn yìng chídùn",meaning:"反応が鈍い"}],
       confuse:[{word:"足智多谋",pinyin:"zú zhì duō móu",meaning:"知恵と謀が豊富。「才思敏捷」は思考の速さ・機転、「足智多谋」は知恵や計略の豊富さ・深さ。"}]},
      {word:"循序渐进",pinyin:"xún xù jiàn jìn",meaning:"順序に従って少しずつ進む。段階を踏んで着実に前進すること。",
       origin:"宋・朱熹の教育論に由来。「循序而游進、熟読而精思」という朱熹の学習法が成語化した。「急いては事を仕損じる」という考えと表裏一体で、基礎を固めて段階的に学ぶことの重要性を説く。",
       example:{zh:"学习要循序渐进，不能急于求成，基础打好了才能走得更远。",pinyin:"Xuéxí yào xún xù jiànjìn, bùnéng jí yú qiúchéng, jīchǔ dǎ hǎo le cái néng zǒu de gèng yuǎn.",ja:"学習は順を追って少しずつ進めるべきで、焦って成果を求めてはいけない。基礎を固めてこそ遠くへ行ける。"},
       synonyms:[{word:"按部就班",pinyin:"àn bù jiù bān",meaning:"順序や規則に従って行動する"}],
       antonyms:[{word:"欲速则不达",pinyin:"yù sù zé bù dá",meaning:"急いては事を仕損じる"}],
       confuse:[{word:"按部就班",pinyin:"àn bù jiù bān",meaning:"「循序渐进」は段階的な進歩・向上を重視、「按部就班」は規則・手順通りに行動することを重視。"}]},
      {word:"温故知新",pinyin:"wēn gù zhī xīn",meaning:"古きを温めて新しきを知る。過去に学んだことを復習することで新しい知見を得ること。",
       origin:"出典：『論語・為政篇』。「温故而知新、可以為師矣」（古いものを温めて新しいものを知ることができれば、師となれる）という孔子の言葉に由来。学問における「復習」の積極的意義を説く言葉として2500年以上使われ続けている。",
       example:{zh:"每次复习旧知识，都能有新的感悟，真是温故知新。",pinyin:"Měi cì fùxí jiù zhīshi, dōu néng yǒu xīn de gǎnwù, zhēn shì wēn gù zhī xīn.",ja:"古い知識を復習するたびに新しい感悟が得られる。まさに温故知新だ。"},
       synonyms:[{word:"以古鉴今",pinyin:"yǐ gǔ jiàn jīn",meaning:"古を鑑として今を知る"}],
       antonyms:[{word:"数典忘祖",pinyin:"shǔ diǎn wàng zǔ",meaning:"典籍を数えながら祖先を忘れる（根本を忘れる）"}],
       confuse:[{word:"以史为鉴",pinyin:"yǐ shǐ wéi jiàn",meaning:"歴史を鑑とする。「温故知新」は個人の学習・復習を通じた新発見、「以史为鉴」は歴史の教訓を現在に生かすこと。"}]},
      {word:"不耻下问",pinyin:"bù chǐ xià wèn",meaning:"目下の者に聞くことを恥じない。知識や地位が下の者にも謙虚に教えを請うこと。",
       origin:"出典：『論語・公冶長篇』。衛の大夫・孔圉（文子）の諡について孔子が「敏くして学を好み、下問を恥じず、これをもって「文」という」と評したことから。「文」という最高の諡号の理由の一つが「下問を恥じない」態度だった。",
       example:{zh:"真正的学者不耻下问，有时候向年轻人请教也是学习的好方法。",pinyin:"Zhēnzhèng de xuézhě bù chǐ xià wèn, yǒushíhou xiàng niánqīngrén qǐngjiào yě shì xuéxí de hǎo fāngfǎ.",ja:"真の学者は目下の者に聞くことを恥じない。時に若者に教えを請うことも学習の良い方法だ。"},
       synonyms:[{word:"虚心求教",pinyin:"xū xīn qiú jiào",meaning:"謙虚な心で教えを求める"}],
       antonyms:[{word:"刚愎自用",pinyin:"gāng bì zì yòng",meaning:"頑固で自分の意見だけを通す"}],
       confuse:[{word:"虚怀若谷",pinyin:"xū huái ruò gǔ",meaning:"谷のように謙虚な心。「不耻下问」は具体的な行動（質問する）、「虚怀若谷」は謙虚な態度・人格全般を指す。"}]}
    ]
  },
  {
    id:"morality2", name:"⚖️ 人間関係・処世", color:"#c9962a",
    words:[
      {word:"推心置腹",pinyin:"tuī xīn zhì fù",meaning:"心を推して腹に置く。真心を打ち明けて心から信頼し合うこと。",
       origin:"出典：『後漢書・光武帝紀』。光武帝（劉秀）が「降伏した将領たちにその旧部下の兵士を指揮させ、推心置腹した」という記述に由来。心を相手の腹の中に置くという視覚的な表現が信頼の深さを伝える。",
       example:{zh:"他们相识多年，推心置腹，无话不谈。",pinyin:"Tāmen xiāngshí duō nián, tuī xīn zhì fù, wúhuà bù tán.",ja:"長年の知り合いで、腹を割って何でも話し合える間柄だ。"},
       synonyms:[{word:"肝胆相照",pinyin:"gān dǎn xiāng zhào",meaning:"肝胆を照らし合う（真心で交わる）"}],
       antonyms:[{word:"口是心非",pinyin:"kǒu shì xīn fēi",meaning:"口では賛成し心では反対する"}],
       confuse:[{word:"肝胆相照",pinyin:"gān dǎn xiāng zhào",meaning:"「推心置腹」は信頼して本音を打ち明けること、「肝胆相照」は互いの真心・誠意を照らし合う深い友情関係。"}]},
      {word:"恩将仇报",pinyin:"ēn jiāng chóu bào",meaning:"恩を仇で返す。親切にしてもらったのに悪意で報いること。",
       origin:"出典：明代の小説『水滸伝』や『西游记』などに用例が見られる。「恩」（恩恵）を「仇」（恨み・敵意）で「将」（もって）「报」（報いる）という構造が非常に明確で、恩知らずな行為への強い非難を込めた表現。",
       example:{zh:"他帮了那个人很多次，没想到对方恩将仇报，在关键时刻出卖了他。",pinyin:"Tā bāng le nàgè rén hěn duō cì, méi xiǎngdào duìfāng ēn jiāng chóu bào, zài guānjiàn shíkè chūmàile tā.",ja:"何度も助けてあげたのに、まさか恩を仇で返して肝心な時に裏切るとは思わなかった。"},
       synonyms:[{word:"忘恩负义",pinyin:"wàng ēn fù yì",meaning:"恩を忘れて義理に背く"}],
       antonyms:[{word:"以德报怨",pinyin:"yǐ dé bào yuàn",meaning:"恨みを徳で返す"}],
       confuse:[{word:"忘恩负义",pinyin:"wàng ēn fù yì",meaning:"「恩将仇报」は恩に対して積極的に害を与えること、「忘恩负义」は恩を忘れて背くこと（積極的加害は含まず）。"}]},
      {word:"同甘共苦",pinyin:"tóng gān gòng kǔ",meaning:"甘さも苦さも共にする。喜びも苦しみも共に分かち合うこと。",
       origin:"出典：『戦国策・燕策一』。燕の昭王が賢人・郭隗に「どうすれば人材を集められるか」と聞いた際、郭隗は「まず私を厚遇すれば、それより優れた人材が集まる」と答えた。「同甘共苦」はこの文脈の中で語られた友誼の原則。",
       example:{zh:"创业初期，他们同甘共苦，一起度过了最艰难的时期。",pinyin:"Chuàngyè chūqī, tāmen tóng gān gòng kǔ, yīqǐ dùguòle zuì jiānnán de shíqī.",ja:"創業初期、彼らは苦楽を共にして最も困難な時期を一緒に乗り越えた。"},
       synonyms:[{word:"患难与共",pinyin:"huàn nàn yǔ gòng",meaning:"苦難を共にする"}],
       antonyms:[{word:"同床异梦",pinyin:"tóng chuáng yì mèng",meaning:"同じ床でも夢が違う（見かけは一緒でも考えが異なる）"}],
       confuse:[{word:"患难与共",pinyin:"huàn nàn yǔ gòng",meaning:"「同甘共苦」は喜びも苦しみも含む全般、「患难与共」は特に苦難・危機の状況での共同を強調。"}]},
      {word:"形影不离",pinyin:"xíng yǐng bù lí",meaning:"形と影が離れない。常に一緒に行動して片時も離れないこと。",
       origin:"唐・元稹の詩「与諸道者同游岳麓山」などに形と影が一体であるという表現が見られる。「形」（実体）と「影」（影）は自然界で決して離れないことから、親密で不可分な関係の比喩として定着した。",
       example:{zh:"他们从小就是形影不离的好朋友，几十年来从未失去联系。",pinyin:"Tāmen cóngxiǎo jiùshì xíng yǐng bù lí de hǎo péngyou, jǐ shí nián lái cóngyì méiyǒu shīqù liánxi.",ja:"幼い頃から片時も離れない仲良しで、何十年もずっと連絡を取り続けている。"},
       synonyms:[{word:"寸步不离",pinyin:"cùn bù bù lí",meaning:"一歩も離れない"}],
       antonyms:[{word:"天各一方",pinyin:"tiān gè yī fāng",meaning:"それぞれが遠く離れている"}],
       confuse:[{word:"如影随形",pinyin:"rú yǐng suí xíng",meaning:"影が形に従うよう。「形影不离」は対等な関係で常に一緒、「如影随形」は片方が片方に従うイメージ。"}]},
      {word:"志同道合",pinyin:"zhì tóng dào hé",meaning:"志が同じで道が合う。理想や目標、考え方が一致すること。",
       origin:"出典：晋・陳寿『三国志・魏書』の注釈部分。「志同道合、思同謀合」という表現が見られる。儒家思想において同じ志を持つ仲間との交流は最高の人間関係とされ、孔子の「友を朋あり」の思想にも通じる。",
       example:{zh:"他们志同道合，一起创办了这家公司，共同追求环保事业。",pinyin:"Tāmen zhì tóng dào hé, yīqǐ chuàngbànle zhè jiā gōngsī, gòngtóng zhuīqiú huánbǎo shìyè.",ja:"志が同じで力を合わせてこの会社を創設し、共に環境事業を追求している。"},
       synonyms:[{word:"心心相印",pinyin:"xīn xīn xiāng yìn",meaning:"心と心が重なり合う（以心伝心）"}],
       antonyms:[{word:"貌合神离",pinyin:"mào hé shén lí",meaning:"見かけは合っているが本心は離れている"}],
       confuse:[{word:"臭味相投",pinyin:"chòu wèi xiāng tóu",meaning:"（否定的）悪趣味・悪癖が合う。「志同道合」は肯定的な意味で理想・目標の一致、「臭味相投」は否定的な意味で悪い性質の一致。"}]},
      {word:"落井下石",pinyin:"luò jǐng xià shí",meaning:"井戸に落ちた人に石を投げる。苦境にある人をさらに追い詰めること。",
       origin:"出典：唐・韓愈「柳子厚墓誌銘」。「落陥阱にあれば、手を差し伸べず石を投げる」という行為を批判した文章に由来。韓愈は薄情な人間の典型的な行為としてこの情景を描写した。",
       example:{zh:"公司倒闭后，原来的合作伙伴不但不帮忙，反而落井下石，索要赔偿。",pinyin:"Gōngsī dǎobì hòu, yuánlái de hézuò huǒbàn bù dàn bù bāngmáng, fǎn'ér luò jǐng xià shí, suǒyāo péicháng.",ja:"会社倒産後、元のパートナーは助けるどころか追い打ちをかけて賠償を要求してきた。"},
       synonyms:[{word:"趁火打劫",pinyin:"chèn huǒ dǎ jié",meaning:"火事に乗じて略奪する"}],
       antonyms:[{word:"雪中送炭",pinyin:"xuě zhōng sòng tàn",meaning:"困っている人に援助する"}],
       confuse:[{word:"趁火打劫",pinyin:"chèn huǒ dǎ jié",meaning:"「落井下石」は他人の不幸に追い打ちをかけること、「趁火打劫」は混乱に乗じて利益を奪うこと。"}]},
      {word:"以德报怨",pinyin:"yǐ dé bào yuàn",meaning:"恨みを徳で返す。自分を傷つけた人に対して善意で接すること。",
       origin:"出典：『論語・憲問篇』。或者が「以徳報怨、何如？」と孔子に問い、孔子は「以直報怨、以徳報徳」（正直さで怨みに報い、徳で徳に報いよ）と答えた。孔子自身は「以徳報怨」より「以直報怨」を推薦したが、前者の方が成語として定着した。",
       example:{zh:"他没有计较对方的过错，反而以德报怨，主动帮助了对方渡过难关。",pinyin:"Tā méiyǒu jijiào duìfāng de guòcuò, fǎn'ér yǐ dé bào yuàn, zhǔdòng bāngzhùle duìfāng dùguò nánguān.",ja:"相手の過ちをとがめず、むしろ恨みを徳で返し、自ら相手の困難を助けた。"},
       synonyms:[{word:"宽宏大量",pinyin:"kuān hóng dà liàng",meaning:"度量が広く寛大"}],
       antonyms:[{word:"以怨报德",pinyin:"yǐ yuàn bào dé",meaning:"恩を怨みで返す"}],
       confuse:[{word:"以直报怨",pinyin:"yǐ zhí bào yuàn",meaning:"正直さで恨みに報いる（孔子の推薦）。「以德报怨」は相手に関係なく善意で接すること。"}]},
      {word:"口蜜腹剑",pinyin:"kǒu mì fù jiàn",meaning:"口は蜜、腹は剣。言葉は甘いが内心は悪意を持っている人のこと。",
       origin:"出典：『資治通鑑・唐紀』。唐の玄宗皇帝の宰相・李林甫は口が甘く人に取り入りながら、内心は陰謀を巡らせ多くの忠臣を陥れた。時の人は彼を「口有蜜、腹有剣」（口に蜜あり、腹に剣あり）と評したことに由来。",
       example:{zh:"要小心那个人，他口蜜腹剑，表面友好，背后却一直在说你的坏话。",pinyin:"Yào xiǎoxīn nàgè rén, tā kǒu mì fù jiàn, biǎomiàn yǒuhǎo, bèihòu què yīzhí zài shuō nǐ de huài huà.",ja:"あの人には気をつけて。言葉は甘いが腹に剣を持つタイプで、表向きは友好的なのに陰でずっと悪口を言っている。"},
       synonyms:[{word:"笑里藏刀",pinyin:"xiào lǐ cáng dāo",meaning:"笑顔の中に刀を隠す"}],
       antonyms:[{word:"心直口快",pinyin:"xīn zhí kǒu kuài",meaning:"心が素直で口も率直"}],
       confuse:[{word:"笑里藏刀",pinyin:"xiào lǐ cáng dāo",meaning:"「口蜜腹剑」は甘い言葉で引きつける一方、「笑里藏刀」は笑顔・友好的態度の裏に悪意を隠す。「口蜜腹剑」は言葉の甘さを強調。"}]},

// ===================== STATE =====================
let currentThemeId = null;
let currentDeck = [];
let currentIdx = 0;
let isFlipped = false;
let testType = 'meaning';
let testDeck = [];
let testIdx = 0;
let testCorrect = 0;
let testAnswered = false;
let currentMode = 'card';
let testCurrentWord = null;

// 学習済み・苦手セット (localStorage)
const LS_LEARNED = 'hsk6v2_learned';
const LS_WEAK    = 'hsk6v2_weak';
function loadSet(key){ try{ return new Set(JSON.parse(localStorage.getItem(key)||'[]')); }catch(e){ return new Set(); } }
function saveSet(key,s){ try{ localStorage.setItem(key,JSON.stringify([...s])); }catch(e){} }
let learnedSet = loadSet(LS_LEARNED);
let weakSet    = loadSet(LS_WEAK);

const allWords = themes.flatMap(t => t.words.map(w => ({...w, themeId:t.id, themeName:t.name})));

// ===================== HOME =====================
function buildHome() {
  // テーマカード
  document.getElementById('homeThemes').innerHTML = themes.map(t => {
    const lc = t.words.filter(w => learnedSet.has(w.word)).length;
    return `<div class="theme-card" onclick="openTheme('${t.id}')">
      <div class="tc-accent"></div>
      <div class="tc-name">${t.name}</div>
      <div class="tc-count">${t.words.length} 語　学習済み ${lc}/${t.words.length}</div>
      <div class="tc-words">${t.words.slice(0,4).map(w=>w.word).join('・')}…</div>
    </div>`;
  }).join('');

  // 索引
  document.getElementById('indexGrid').innerHTML = allWords.map(w => `
    <div class="index-row" onclick="openFromIndex('${w.themeId}','${w.word}')">
      <div class="ir-word">${w.word}</div>
      <div class="ir-pinyin">${w.pinyin}</div>
      <div class="ir-theme">${w.themeName}</div>
      <div class="ir-badges">
        ${learnedSet.has(w.word)?'<span class="ir-badge">✅</span>':''}
        ${weakSet.has(w.word)?'<span class="ir-badge">⚠️</span>':''}
      </div>
    </div>`).join('');

  // 進捗
  const total = allWords.length;
  const lc = allWords.filter(w=>learnedSet.has(w.word)).length;
  document.getElementById('psFill').style.width = `${lc/total*100}%`;
  document.getElementById('psCount').textContent = `${lc} / ${total}`;
  document.getElementById('psWeakLink').textContent = `⚠️ 苦手 ${weakSet.size}語`;

  // 苦手リスト
  buildWeakList();
}

function buildWeakList() {
  const wc = document.getElementById('weakContent');
  const words = allWords.filter(w => weakSet.has(w.word));
  if(words.length === 0){
    wc.innerHTML = `<div class="weak-empty">苦手成語はまだありません。<br>カード画面の ★ ボタンまたはテスト結果から登録できます。</div>`;
    return;
  }
  wc.innerHTML = `<div class="weak-grid">${words.map(w=>`
    <div class="weak-row" onclick="openFromIndex('${w.themeId}','${w.word}')">
      <div class="wr-word">${w.word}</div>
      <div class="wr-pinyin">${w.pinyin}</div>
      <button class="wr-del" onclick="removeWeak(event,'${w.word}')">✕</button>
    </div>`).join('')}</div>`;
}

function removeWeak(e, word){ e.stopPropagation(); weakSet.delete(word); saveSet(LS_WEAK,weakSet); buildHome(); }

function showHomeTab(tab) {
  document.querySelectorAll('.nav-tab').forEach((b,i)=>{
    b.classList.toggle('active', ['themes','index','weak'][i]===tab);
  });
  document.getElementById('homeThemes').style.display  = tab==='themes'?'grid':'none';
  document.getElementById('homeIndex').style.display   = tab==='index'?'block':'none';
  document.getElementById('homeWeak').style.display    = tab==='weak'?'block':'none';
}

function openTheme(themeId, startWord) {
  currentThemeId = themeId;
  const theme = themes.find(t=>t.id===themeId);
  currentDeck = theme.words;
  currentIdx  = startWord ? Math.max(0, currentDeck.findIndex(w=>w.word===startWord)) : 0;
  isFlipped   = false;
  currentMode = 'card';
  document.getElementById('cardScreenTitle').textContent = theme.name;
  document.getElementById('card').classList.remove('flipped');
  showScreen('cardScreen');
  renderCard();
  updateModeBtns();
}
function openFromIndex(tid,word){ openTheme(tid,word); }
function goHome(){ showScreen('homeScreen'); buildHome(); window.speechSynthesis&&window.speechSynthesis.cancel(); }
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

// ===================== CARD =====================
function renderCard() {
  const d   = currentDeck[currentIdx];
  const no  = allWords.findIndex(w=>w.word===d.word) + 51;
  const isL = learnedSet.has(d.word);
  const isW = weakSet.has(d.word);

  document.getElementById('frontChengyu').textContent = d.word;
  document.getElementById('frontPinyin').textContent  = d.pinyin;
  document.getElementById('cardBadge').textContent    = `No.${no}`;
  document.getElementById('backChengyu').textContent  = d.word;
  document.getElementById('backPinyin').textContent   = d.pinyin;
  document.getElementById('backMeaning').textContent  = d.meaning;

  // 学習済み・苦手ボタン
  const lBtn = document.getElementById('learnedBtn');
  const wBtn = document.getElementById('weakBtn');
  lBtn.className = 'card-action-btn' + (isL?' active-learned':'');
  lBtn.title = isL ? '学習済みを取り消す' : '学習済みにする';
  wBtn.className = 'card-action-btn' + (isW?' active-weak':'');
  wBtn.title = isW ? '苦手を取り消す' : '苦手に追加';

  // ステータスラベル
  const sr = document.getElementById('cardStatusRow');
  sr.innerHTML = (isL?'<span class="status-learned">✅ 学習済み</span>':'') + (isW?'<span class="status-weak">⚠️ 苦手</span>':'');

  // 裏面コンテンツ
  buildInfoGrid(d);

  // ドット
  const dots = document.getElementById('dots');
  dots.innerHTML = currentDeck.map((_,i)=>{
    const w = currentDeck[i];
    let cls = 'dot';
    if(i===currentIdx) cls += ' active';
    if(learnedSet.has(w.word)) cls += ' is-learned';
    if(weakSet.has(w.word))    cls += ' is-weak';
    return `<div class="${cls}" onclick="jumpTo(${i})"></div>`;
  }).join('');

  // プログレス
  const pct = ((currentIdx+1)/currentDeck.length*100).toFixed(0);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressText').textContent = `${currentIdx+1} / ${currentDeck.length}`;
  document.getElementById('prevBtn').disabled = currentIdx===0;
  document.getElementById('nextBtn').disabled = currentIdx===currentDeck.length-1;
}

function buildInfoGrid(d) {
  let html = '';
  // 例文
  if(d.example){
    const zh = d.example.zh.replace(d.word,`<span class="hl">${d.word}</span>`);
    html += `<div class="info-card ex-card">
      <div class="ex-label">◆ 例文</div>
      <div class="ex-zh">${zh}
        <button class="mini-speak-btn" onclick="speak('${d.example.zh}',event)">🔊</button>
      </div>
      <div class="ex-py">${d.example.pinyin}</div>
      <div class="ex-ja">${d.example.ja}</div>
    </div>`;
  }
  // 類義語
  if(d.synonyms?.length){
    html += `<div class="info-card syn"><div class="info-card-label">類義語</div>${d.synonyms.map(x=>itemHTML(x)).join('')}</div>`;
  }
  // 対義語
  if(d.antonyms?.length){
    html += `<div class="info-card ant"><div class="info-card-label">対義語</div>${d.antonyms.map(x=>itemHTML(x)).join('')}</div>`;
  }
  // 混同しやすい
  if(d.confuse?.length){
    html += `<div class="info-card conf"><div class="info-card-label">混同しやすい成語</div>${d.confuse.map(x=>itemHTML(x)).join('')}</div>`;
  }
  // 由来
  if(d.origin){
    html += `<div class="info-card" style="grid-column:1/-1;border-top:2px solid var(--purple);">
      <div class="info-card-label" style="color:var(--purple);">◆ 由来・出典</div>
      <div style="font-size:12px;line-height:1.8;color:var(--faded);">${d.origin}</div>
    </div>`;
  }
  document.getElementById('infoGrid').innerHTML = html;
}

function itemHTML(x){
  return `<div class="info-item">
    <div class="info-item-header">
      <span class="info-chinese">${x.word}</span>
      <span class="info-pinyin">${x.pinyin}</span>
      <button class="mini-speak-btn" onclick="speak('${x.word}',event)">🔊</button>
    </div>
    <div class="info-meaning">${x.meaning}</div>
  </div>`;
}

function flipCard(){
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
  document.getElementById('flipBtnText').textContent = isFlipped ? '戻す' : 'めくる';
}

function navigate(dir){
  if(dir===-1 && currentIdx===0) return;
  if(dir===1 && currentIdx===currentDeck.length-1) return;
  const card = document.getElementById('card');
  const outCls = dir===1?'slide-out-l':'slide-out-r';
  const inCls  = dir===1?'slide-in-r':'slide-in-l';
  card.classList.add(outCls);
  setTimeout(()=>{
    card.classList.remove(outCls,'flipped');
    currentIdx += dir;
    isFlipped = false;
    document.getElementById('flipBtnText').textContent='めくる';
    renderCard();
    card.classList.add(inCls);
    setTimeout(()=>card.classList.remove(inCls),300);
  },260);
}

function jumpTo(i){
  if(i===currentIdx) return;
  currentIdx=i; isFlipped=false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('flipBtnText').textContent='めくる';
  renderCard();
}

// 学習済み・苦手トグル
function toggleLearned(e){
  e.stopPropagation();
  const w = currentDeck[currentIdx].word;
  if(learnedSet.has(w)) learnedSet.delete(w); else learnedSet.add(w);
  saveSet(LS_LEARNED, learnedSet);
  renderCard();
}
function toggleWeak(e){
  e.stopPropagation();
  const w = currentDeck[currentIdx].word;
  if(weakSet.has(w)) weakSet.delete(w); else weakSet.add(w);
  saveSet(LS_WEAK, weakSet);
  renderCard();
}

// モード切替
function switchMode(mode){
  currentMode = mode;
  updateModeBtns();
  if(mode==='card'){
    showScreen('cardScreen');
    renderCard();
  } else {
    initTest();
    showScreen('testScreen');
    document.getElementById('testScreenTitle').textContent = currentDeck[0]?.themeName||'テスト';
  }
}
function updateModeBtns(){
  document.querySelectorAll('.mode-btn').forEach((b,i)=>{
    b.classList.toggle('active',(currentMode==='card'&&i===0)||(currentMode==='test'&&i===1));
  });
}

// ===================== TTS =====================
function speakCurrent(e){
  if(e) e.stopPropagation();
  const d = currentDeck[currentIdx];
  speak(d.word + '。' + d.example?.zh, {btn: document.getElementById('speakBtn')});
}

function speak(text, e){
  if(e?.stopPropagation) e.stopPropagation();
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const btn = e?.target || e?.btn;
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang='zh-CN'; utt.rate=0.65;
  const voices = speechSynthesis.getVoices();
  const zh = voices.find(v=>v.lang==='zh-CN'||v.lang==='zh_CN');
  if(zh) utt.voice=zh;
  if(btn){ btn.classList.add('speaking'); }
  document.getElementById('ttsStatus').textContent='🔊 再生中…';
  utt.onend=()=>{
    document.getElementById('ttsStatus').textContent='';
    if(btn) btn.classList.remove('speaking');
  };
  speechSynthesis.speak(utt);
}

document.addEventListener('keydown',e=>{
  const cs = document.querySelector('.screen.active')?.id;
  if(cs==='cardScreen'){
    if(e.key==='ArrowLeft') navigate(-1);
    if(e.key==='ArrowRight') navigate(1);
    if(e.key===' '){ e.preventDefault(); flipCard(); }
  }
});

// ===================== TEST =====================
function setTestType(t){
  testType=t;
  document.querySelectorAll('.test-type-btn').forEach((b,i)=>b.classList.toggle('active',['meaning','word','pinyin'][i]===t));
  initTest();
}

function initTest(){
  testDeck=[...currentDeck].sort(()=>Math.random()-.5);
  testIdx=0; testCorrect=0; testAnswered=false; testCurrentWord=null;
  renderTestQuestion();
}

function renderTestQuestion(){
  const cont = document.getElementById('testContent');
  if(testIdx>=testDeck.length){
    const pct = Math.round(testCorrect/testDeck.length*100);
    cont.innerHTML=`<div class="test-complete">
      <div class="tc-score">${testCorrect}/${testDeck.length}</div>
      <div class="tc-msg">${pct}% 正解${pct>=80?'　🎉 素晴らしい！':pct>=60?'　👍 もう少し！':'　📚 復習しよう'}</div>
      <button class="restart-btn" onclick="initTest()">もう一度</button>
    </div>`;
    updateTestScore(); return;
  }
  const d = testDeck[testIdx];
  testCurrentWord = d;
  testAnswered = false;
  updateTestScore();

  if(testType==='meaning'){
    const opts = getOptions(d, allWords, 'meaning');
    cont.innerHTML=`<div class="test-card">
      <div class="test-question-label">この成語の意味は？</div>
      <div class="test-word">${d.word}</div>
      <div class="test-pinyin">${d.pinyin}</div>
      <div class="choices">${opts.map(o=>`<button class="choice-btn" onclick="answerMeaning(this,'${o.word}','${d.word}')">${o.meaning}</button>`).join('')}</div>
      <div class="test-result-box" id="testResult"></div>
    </div>`;
  } else if(testType==='word'){
    const opts = getOptions(d, allWords, 'word');
    cont.innerHTML=`<div class="test-card">
      <div class="test-question-label">この意味の成語は？</div>
      <div class="test-pinyin" style="margin-bottom:16px;font-size:14px;color:var(--ink);">${d.meaning}</div>
      <div class="choices">${opts.map(o=>`<button class="choice-btn" onclick="answerWord(this,'${o.word}','${d.word}')"><span class="choice-chinese">${o.word}</span>${o.pinyin}</button>`).join('')}</div>
      <div class="test-result-box" id="testResult"></div>
    </div>`;
  } else {
    cont.innerHTML=`<div class="test-card">
      <div class="test-question-label">拼音を入力してください</div>
      <div class="test-word">${d.word}</div>
      <div class="pinyin-hint">声調記号あり・なし・番号（例: yi1 shi2）すべて正解</div>
      <div class="pinyin-input-wrap">
        <input class="pinyin-input" id="pinyinInput" placeholder="例: pò fǔ chén zhōu" autocomplete="off">
        <button class="submit-btn" onclick="answerPinyin()">確認</button>
      </div>
      <div class="pinyin-feedback" id="pinyinFeedback"></div>
      <div class="test-result-box" id="testResult"></div>
    </div>`;
    setTimeout(()=>document.getElementById('pinyinInput')?.focus(),100);
    document.getElementById('pinyinInput')?.addEventListener('keydown',e=>{ if(e.key==='Enter') answerPinyin(); });
  }
}

function getOptions(d, pool, type){
  const wrong = pool.filter(w=>w.word!==d.word).sort(()=>Math.random()-.5).slice(0,3);
  const opts = [...wrong, d].sort(()=>Math.random()-.5);
  return opts;
}

function answerMeaning(btn, chosen, correct){
  if(testAnswered) return;
  testAnswered=true;
  const isCorrect = chosen===correct;
  if(isCorrect) testCorrect++;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    const w = testDeck.find(x=>x.meaning===b.textContent);
    if(b===btn) b.classList.add(isCorrect?'correct':'wrong');
    b.disabled=true;
  });
  // 正解ボタンにcorrectクラス
  document.querySelectorAll('.choice-btn').forEach(b=>{
    if(b.textContent===testCurrentWord.meaning) b.classList.add('correct');
  });
  showTestResult(isCorrect);
  updateTestScore();
}

function answerWord(btn, chosen, correct){
  if(testAnswered) return;
  testAnswered=true;
  const isCorrect = chosen===correct;
  if(isCorrect) testCorrect++;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    const bw = b.querySelector('.choice-chinese')?.textContent;
    if(bw===correct) b.classList.add('correct');
    else if(b===btn&&!isCorrect) b.classList.add('wrong');
  });
  showTestResult(isCorrect);
  updateTestScore();
}

function answerPinyin(){
  if(testAnswered) return;
  const inp = document.getElementById('pinyinInput');
  if(!inp) return;
  const val = inp.value.trim();
  if(!val) return;
  testAnswered=true;
  const d = testCurrentWord;
  const isCorrect = matchPinyin(val, d.pinyin);
  if(isCorrect) testCorrect++;
  inp.classList.add(isCorrect?'correct':'wrong');
  inp.disabled=true;
  document.querySelector('.submit-btn').disabled=true;
  const fb = document.getElementById('pinyinFeedback');
  fb.className='pinyin-feedback '+(isCorrect?'correct':'wrong');
  fb.textContent = isCorrect?'✅ 正解！':`❌ 正解: ${d.pinyin}`;
  showTestResult(isCorrect);
  updateTestScore();
}

function matchPinyin(input, correct){
  const norm = s => s.toLowerCase().replace(/[āáǎà]/g,'a').replace(/[ēéěè]/g,'e').replace(/[īíǐì]/g,'i').replace(/[ōóǒò]/g,'o').replace(/[ūúǔù]/g,'u').replace(/[ǖǘǚǜü]/g,'u').replace(/\s+/g,' ').trim();
  const numTone = s => s.toLowerCase().replace(/([aeiouü])([1-4])/g,'$1').replace(/\s+/g,' ').trim();
  const ci = norm(input); const cc = norm(correct);
  if(ci===cc) return true;
  if(numTone(input)===numTone(correct)) return true;
  return false;
}

function showTestResult(isCorrect){
  const d = testCurrentWord;
  const rb = document.getElementById('testResult');
  rb.classList.add('show');
  const isW = weakSet.has(d.word);
  rb.innerHTML=`
    <div class="result-word">${isCorrect?'✅':'❌'} ${d.word}　${d.pinyin}
      <button class="mini-speak-btn" onclick="speak('${d.word}',event)" style="margin-left:6px;">🔊</button>
    </div>
    <div style="font-size:12px;color:var(--faded);margin-bottom:4px;">${d.meaning}</div>
    ${!isCorrect?`<button class="add-weak-btn ${isW?'registered':''}" id="addWeakBtn" onclick="addToWeak('${d.word}')">
      ${isW?'⚠️ 苦手登録済み':'⚠️ 苦手に追加'}
    </button>`:''}
    ${d.origin?`<div style="font-size:11px;color:var(--purple);margin-top:8px;line-height:1.7;">📜 ${d.origin}</div>`:''}
    <button class="next-test-btn" onclick="nextTest()">次へ →</button>`;
}

function addToWeak(word){
  weakSet.add(word);
  saveSet(LS_WEAK, weakSet);
  const btn = document.getElementById('addWeakBtn');
  if(btn){ btn.textContent='⚠️ 苦手登録済み'; btn.classList.add('registered'); }
}

function nextTest(){ testIdx++; renderTestQuestion(); }

function updateTestScore(){
  document.getElementById('testScore').innerHTML=`${testCorrect} <span>/ ${testIdx}</span>`;
  document.getElementById('testProgress').textContent=`${testIdx+1} / ${testDeck.length}`;
}

// ===================== INIT =====================
buildHome();
</script>
